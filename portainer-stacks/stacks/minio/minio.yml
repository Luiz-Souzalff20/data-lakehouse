version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio

    restart: unless-stopped

    ports:
      - "9001:9000"
      - "9002:9002"

    environment:
      MINIO_ROOT_USER: admin_minio
      MINIO_ROOT_PASSWORD: Grunt9-Relenting6-Hula5-Catcall9-Residue3

    command: server /data --console-address ":9002"

    volumes:
      - minio_data:/data

    networks:
      - lakehouse

networks:
  lakehouse:
    external: true

volumes:
  minio_data: