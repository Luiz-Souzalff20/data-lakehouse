# =============================================================
#  spark-defaults.conf  ─  compartilhado entre Spark e Jupyter
# =============================================================

# ── Cluster ───────────────────────────────────────────────────
spark.master                            spark://spark-master:7077

# ── Iceberg ───────────────────────────────────────────────────
spark.sql.extensions                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse             org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type        rest
spark.sql.catalog.lakehouse.uri         http://spark-master:8181
spark.sql.catalog.lakehouse.io-impl     org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lakehouse.s3.endpoint http://minio:9000
spark.sql.catalog.lakehouse.warehouse   s3://lakehouse/warehouse
spark.sql.defaultCatalog                lakehouse

# ── S3A → MinIO ───────────────────────────────────────────────
spark.hadoop.fs.s3a.endpoint            http://minio:9000
spark.hadoop.fs.s3a.access.key          admin_minio
spark.hadoop.fs.s3a.secret.key          Grunt9-Relenting6-Hula5-Catcall9-Residue3
spark.hadoop.fs.s3a.path.style.access   true
spark.hadoop.fs.s3a.impl                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled  false
spark.hadoop.fs.s3a.aws.credentials.provider  org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# ── Jars ──────────────────────────────────────────────────────
spark.jars.packages                     org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2
spark.driver.extraClassPath             /opt/spark/jars/iceberg/*
spark.executor.extraClassPath           /opt/spark/jars/iceberg/*

# ── Performance ───────────────────────────────────────────────
spark.sql.adaptive.enabled              true
spark.serializer                        org.apache.spark.serializer.KryoSerializer