version: "3.9"

services:
  jenkins:
    build:
      context: .
      dockerfile_inline: |
        FROM jenkins/jenkins:lts-jdk21
        USER root
        RUN apt-get update && \
            apt-get install -y docker.io && \
            apt-get clean
        USER jenkins
    container_name: jenkins_novo

    restart: unless-stopped

    ports:
      - "8080:8080"
      - "50000:50000"

    user: root

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - lakehouse

networks:
  lakehouse:
    external: true

volumes:
  jenkins_home: